services:
  - type: web
    name: xburger-backend
    runtime: node
    rootDir: backend
    plan: starter
    buildCommand: npm ci && npm run prisma:generate && npm run build
    startCommand: npm run prisma:migrate:deploy && npm run prisma:seed && npm run start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: xburger-postgres
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 12h
      - key: CORS_ORIGINS
        value: https://lanchesdoben.com.br,https://www.lanchesdoben.com.br
      - key: SEED_ADMIN_EMAIL
        sync: false
      - key: SEED_ADMIN_PASSWORD
        sync: false
      - key: SEED_ADMIN_NAME
        value: Administrador
      - key: DEFAULT_TIMEZONE
        value: America/Sao_Paulo

databases:
  - name: xburger-postgres
    plan: starter
    databaseName: xburger
    user: xburger
