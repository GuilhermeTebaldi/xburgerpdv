services:
  - type: web
    name: xburger-backend
    runtime: node
    rootDir: backend
    plan: starter
    buildCommand: npm install --include=dev && npm run prisma:generate && npm run build
    startCommand: npm run prisma:migrate:deploy && npm run prisma:seed && npm run start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 12h
      - key: CORS_ORIGINS
        value: https://xburgerpdv.com.br,https://www.xburgerpdv.com.br,https://app.xburgerpdv.com.br,https://*.xburgerpdv.com.br
      - key: SEED_ADMIN_EMAIL
        sync: false
      - key: SEED_ADMIN_PASSWORD
        sync: false
      - key: SEED_ADMIN_NAME
        value: Administrador
      - key: DEFAULT_TIMEZONE
        value: America/Sao_Paulo
      - key: APP_STATE_BACKUP_RETENTION_DAYS
        value: "35"
      - key: APP_STATE_BACKUP_SCHEDULER_ENABLED
        value: "true"
      - key: APP_STATE_BACKUP_CHECK_INTERVAL_MS
        value: "3600000"

  - type: cron
    name: xburger-backup-daily
    runtime: node
    rootDir: backend
    schedule: 20 4 * * *
    buildCommand: npm install --include=dev && npm run prisma:generate && npm run build
    startCommand: npm run backup:run
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DEFAULT_TIMEZONE
        value: America/Sao_Paulo
      - key: APP_STATE_BACKUP_RETENTION_DAYS
        value: "35"
